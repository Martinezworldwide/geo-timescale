# Build the library and deploy the static demo to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages when the repo has not been configured yet
          enablement: true

      - name: Prepare static site artifact
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r dist _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
